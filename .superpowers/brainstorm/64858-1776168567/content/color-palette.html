<h2>配色方案细化</h2>
<p class="subtitle">同样是仙气绿色古典风，以下三个方向各有侧重，看哪个最接近你心中的感觉</p>

<div class="cards">

  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="border-radius:8px; overflow:hidden; margin-bottom:12px;">
      <!-- 方案A：竹林烟雨 -->
      <div style="background: #f2f5f0; padding: 16px; height: 180px; display:flex; flex-direction:column; gap:8px;">
        <div style="background:#e8ede4; border-radius:4px; padding: 6px 12px; font-size:12px; color:#4a6741; font-weight:600; letter-spacing:1px;">凡人修仙传 · 人界篇</div>
        <div style="display:flex; gap:8px; flex:1;">
          <div style="background:#d4e0cc; border-radius:4px; width:80px; display:flex;align-items:center;justify-content:center; font-size:10px; color:#4a6741;">导航栏</div>
          <div style="background:#ffffff; border-radius:4px; flex:1; padding:8px;">
            <div style="width:60%; height:8px; background:#b8cdb0; border-radius:2px; margin-bottom:6px;"></div>
            <div style="width:100%; height:5px; background:#e0e8db; border-radius:2px; margin-bottom:4px;"></div>
            <div style="width:80%; height:5px; background:#e0e8db; border-radius:2px;"></div>
          </div>
        </div>
        <div style="display:flex; gap:6px;">
          <div style="background:#7a9e72; border-radius:3px; padding:3px 10px; font-size:10px; color:white;">主按钮</div>
          <div style="background:#c8d8c2; border-radius:3px; padding:3px 10px; font-size:10px; color:#4a6741;">次按钮</div>
          <div style="width:16px;height:16px;border-radius:50%;background:#7a9e72;"></div>
          <div style="width:16px;height:16px;border-radius:50%;background:#b8cdb0;"></div>
          <div style="width:16px;height:16px;border-radius:50%;background:#d4e0cc;"></div>
          <div style="width:16px;height:16px;border-radius:50%;background:#f2f5f0;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>竹林烟雨</h3>
      <p>浅灰绿底色，青竹绿点缀，清雅宁静，像竹林间的薄雾晨光</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="border-radius:8px; overflow:hidden; margin-bottom:12px;">

        <div style="background:#ddeedd; border-radius:4px; padding: 6px 12px; font-size:12px; color:#2d6e4e; font-weight:600; letter-spacing:1px;">凡人修仙传 · 人界篇</div>
        <div style="display:flex; gap:8px; flex:1;">

            <div style="width:60%; height:8px; background:#8fbc8f; border-radius:2px; margin-bottom:6px;"></div>
            <div style="width:100%; height:5px; background:#ddeedd; border-radius:2px; margin-bottom:4px;"></div>
            <div style="width:80%; height:5px; background:#ddeedd; border-radius:2px;"></div>
          </div>

        <div style="display:flex; gap:6px;">

          <div style="background:#c5dfc5; border-radius:3px; padding:3px 10px; font-size:10px; color:#2d6e4e;">次按钮</div>

          <div style="width:16px;height:16px;border-radius:50%;background:#eef4ee;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">

        </div>
